name: Carbon Credits API Tests
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v4
      - run: corepack enable
      - name: deps installation
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test:run
